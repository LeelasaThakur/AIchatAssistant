<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* Bright Modern Colors */
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            
            /* Light Mode */
            --bg-main: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* ========================================
           APP CONTAINER
        ======================================== */
        .app-container {
            display: flex;
            height: 100vh;
        }
        
        /* ========================================
           SIDEBAR
        ======================================== */
        .sidebar {
            width: 280px;
            background: var(--bg-main);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        
        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            border-right: none;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .new-chat-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        
        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }
        
        .new-chat-btn:active {
            transform: translateY(0);
        }
        
        .new-chat-btn svg {
            stroke-width: 2.5;
        }
        
        /* Scrollbar */
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .history-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .history-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        .history-list::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
        
        /* History Items */
        .history-item {
            padding: 12px 16px;
            margin-bottom: 6px;
            background: var(--bg-secondary);
            border: 1px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        
        .history-item:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
        }
        
        .history-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border-color: var(--primary);
        }
        
        .history-item-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .history-item-date {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .delete-chat-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--error);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s ease;
        }
        
        .history-item:hover .delete-chat-btn {
            opacity: 1;
        }
        
        .delete-chat-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
        
        /* ========================================
           MAIN CONTENT
        ======================================== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
        }
        
        .chat-header {
            background: var(--bg-main);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 1px 3px var(--shadow);
        }
        
        .toggle-sidebar-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .toggle-sidebar-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
        }
        
        .toggle-sidebar-btn svg {
            stroke: var(--text-primary);
        }
        
        .chat-title {
            flex: 1;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .icon-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
            transform: translateY(-1px);
        }
        
        /* ========================================
           CHAT MESSAGES
        ======================================== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
        
        /* Welcome Message */
        .welcome-message {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .welcome-message h2 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        
        .welcome-message p {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }
        
        /* Quick Prompts */
        .quick-prompts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .prompt-btn {
            background: var(--bg-main);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .prompt-btn:hover {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(139, 92, 246, 0.05));
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }
        
        /* ========================================
           MESSAGES
        ======================================== */
        .message {
            margin-bottom: 24px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 80%;
        }
        
        .user-message .message-wrapper {
            margin-left: auto;
            align-items: flex-end;
        }
        
        .message-sender {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 0 4px;
        }
        
        .user-message .message-sender {
            color: var(--primary);
        }
        
        .message-content {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 15px;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .user-message .message-content {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
        }
        
        .assistant-message .message-content {
            background: var(--bg-main);
        }
        
        .message-timestamp {
            font-size: 11px;
            color: var(--text-secondary);
            padding: 0 4px;
        }
        
        /* Copy Button */
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s ease;
        }
        
        .message-content:hover .copy-btn {
            opacity: 1;
        }
        
        .copy-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.05);
        }
        
        .copy-btn.copied {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }
        
        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 8px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
            background: var(--secondary);
        }
        
        .typing-indicator span:nth-child(3) {
            background: var(--accent);
        }
        
        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
        
        /* ========================================
           INPUT AREA
        ======================================== */
        .input-area {
            padding: 20px 24px;
            background: var(--bg-main);
            border-top: 1px solid var(--border);
        }
        
        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 8px;
            transition: all 0.2s ease;
            position: relative;
        }
        
        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .attach-btn,
        .send-btn {
            background: var(--bg-tertiary);
            border: none;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        
        .attach-btn:hover,
        .send-btn:hover {
            background: var(--primary);
        }
        
        .attach-btn:hover svg,
        .send-btn:hover svg {
            stroke: white;
        }
        
        .attach-btn svg,
        .send-btn svg {
            stroke: var(--text-secondary);
        }
        
        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
        }
        
        .send-btn svg {
            stroke: white;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        
        .send-btn:disabled {
            background: var(--bg-tertiary);
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .send-btn:disabled svg {
            stroke: var(--text-secondary);
        }
        
        .user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 8px 12px;
            font-family: inherit;
            font-size: 15px;
            resize: none;
            outline: none;
            line-height: 1.5;
            max-height: 200px;
        }
        
        .user-input::placeholder {
            color: var(--text-secondary);
        }
        
        .char-count {
            position: absolute;
            bottom: -22px;
            right: 12px;
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        .char-count.warning {
            color: var(--warning);
        }
        
        .char-count.limit {
            color: var(--error);
        }
        
        /* ========================================
           LOADING INDICATOR
        ======================================== */
        .loading-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 24px;
            display: none;
            box-shadow: 0 8px 24px var(--shadow);
        }
        
        .loading-dots {
            display: flex;
            gap: 6px;
        }
        
        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .loading-dots span:nth-child(2) {
            background: var(--secondary);
            animation-delay: -0.16s;
        }
        
        .loading-dots span:nth-child(3) {
            background: var(--accent);
            animation-delay: -0.32s;
        }
        
        /* ========================================
           ERROR & RETRY
        ======================================== */
        .error-message {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: var(--error) !important;
            color: var(--error) !important;
        }
        
        .retry-btn {
            margin-top: 12px;
            background: var(--error);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .retry-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
        
        /* ========================================
           CODE BLOCKS
        ======================================== */
        .message-content pre {
            background: #1f2937;
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 12px 0;
        }
        
        .message-content code {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }
        
        .message-content pre code {
            background: transparent;
            color: #e5e7eb;
            padding: 0;
        }
        
        .user-message .message-content code {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        /* ========================================
           DARK MODE
        ======================================== */
        body.dark-mode {
            --bg-main: #1f2937;
            --bg-secondary: #111827;
            --bg-tertiary: #374151;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border: #374151;
            --shadow: rgba(0, 0, 0, 0.3);
        }
        
        body.dark-mode .message-content pre {
            background: #0f172a;
        }
        
        /* ========================================
           MOBILE RESPONSIVE
        ======================================== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                z-index: 1000;
                box-shadow: 2px 0 8px var(--shadow);
            }
        
            .sidebar.collapsed {
                transform: translateX(-280px);
            }
        
            .chat-title {
                font-size: 16px;
            }
        
            .message-wrapper {
                max-width: 90%;
            }
        
            .quick-prompts {
                grid-template-columns: 1fr;
            }
        }
        
        /* ========================================
           UTILITY
        ======================================== */
        .hidden {
            display: none;
        }
        
        /* Smooth transitions */
        * {
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }
        
        button {
            font-family: inherit;
        }</style>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>
            </div>
            <div class="history-list" id="historyList">
                <!-- History items will be added here -->
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="chat-header">
                <button class="toggle-sidebar-btn" id="toggleSidebarBtn" title="Toggle sidebar" aria-label="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="chat-title">AI Chat Assistant</div>
                <div class="header-actions">
                    <button id="darkModeToggle" class="icon-btn" title="Toggle dark mode">
                        <!-- Sun icon for light mode (will switch to moon in dark mode) -->
                        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <!-- Moon icon for dark mode (hidden by default) -->
                        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                
                    <button id="downloadBtn" class="icon-btn" title="Download chat">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Chat Messages -->
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <h2>Welcome!</h2>
                    <p>How can I help you today?</p>
                    <div class="quick-prompts">
                        <button class="prompt-btn" onclick="usePrompt('Explain quantum computing in simple terms')">
                            💡 Explain quantum computing
                        </button>
                        <button class="prompt-btn" onclick="usePrompt('Write a Python function to sort a list')">
                            💻 Code example
                        </button>
                        <button class="prompt-btn" onclick="usePrompt('Give me 5 productivity tips')">
                            📝 Productivity tips
                        </button>
                        <button class="prompt-btn" onclick="usePrompt('Tell me a fun fact')">
                            🎲 Fun fact
                        </button>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <button class="attach-btn" id="attachBtn" title="Attach file">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </button>
                    <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.doc,.docx" multiple style="display: none;">
                    
                    <textarea 
                        id="userInput" 
                        class="user-input" 
                        placeholder="Send a message..." 
                        rows="1"
                        maxlength="1000"
                    ></textarea>
                    
                    <span id="charCount" class="char-count">0/1000</span>
                    
                    <button id="sendBtn" class="send-btn" title="Send message" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingIndicator" class="loading-indicator">
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <script>
        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const historyList = document.getElementById('historyList');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const darkModeToggle = document.getElementById('darkModeToggle');
        const charCount = document.getElementById('charCount');

        const MAX_CHARS = 1000;

        // Chat History Management
        let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];
        let currentChatId = null;
        let lastFailedMessage = null;

        // Dark Mode with icon switching
        const sunIcon = darkModeToggle.querySelector('.sun-icon');
        const moonIcon = darkModeToggle.querySelector('.moon-icon');

        const isDarkMode = localStorage.getItem('darkMode') === 'true';

        if (isDarkMode) {
            document.body.classList.add('dark-mode');
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
        }

        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');

            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);

            // Toggle icons
            if (isDark) {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        });

        // Initialize
        window.addEventListener('load', () => {
            if (chatHistory.length === 0) {
                createNewChat();
            } else {
                loadChat(chatHistory[0].id);
            }
            loadHistoryList();
            userInput.focus();
        });

        // Toggle Sidebar
        toggleSidebarBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });

        // Character Counter
        userInput.addEventListener('input', function() {
            const length = this.value.length;
            charCount.textContent = `${length}/${MAX_CHARS}`;

            charCount.classList.remove('warning', 'limit');
            if (length > MAX_CHARS * 0.9) {
                charCount.classList.add('warning');
            }
            if (length > MAX_CHARS) {
                charCount.classList.add('limit');
            }

            sendBtn.disabled = length === 0 || length > MAX_CHARS;

            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Send on Enter
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Attach file button
        attachBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length > 0) {
                let fileNames = Array.from(files).map(f => f.name).join(', ');
                alert(`Files selected: ${fileNames}\n\nNote: File upload functionality will be implemented in the backend.`);
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        newChatBtn.addEventListener('click', createNewChat);
        downloadBtn.addEventListener('click', downloadChat);

        function createNewChat() {
            const chatId = Date.now().toString();
            const newChat = {
                id: chatId,
                title: 'New Chat',
                messages: [],
                createdAt: new Date().toISOString()
            };

            chatHistory.unshift(newChat);
            localStorage.setItem('chatHistory', JSON.stringify(chatHistory));

            currentChatId = chatId;
            clearChatDisplay();
            loadHistoryList();
        }

        function loadChat(chatId) {
            currentChatId = chatId;
            const chat = chatHistory.find(c => c.id === chatId);

            if (!chat) return;

            clearChatDisplay();

            chat.messages.forEach(msg => {
                addMessage(msg.content, msg.isUser);
            });

            loadHistoryList();
        }

        function saveMessage(message, isUser) {
            const chat = chatHistory.find(c => c.id === currentChatId);
            if (!chat) return;

            chat.messages.push({
                content: message,
                isUser: isUser,
                timestamp: new Date().toISOString()
            });

            if (isUser && chat.messages.length === 1) {
                chat.title = message.substring(0, 30) + (message.length > 30 ? '...' : '');
            }

            localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
            loadHistoryList();
        }

        function loadHistoryList() {
            historyList.innerHTML = '';

            chatHistory.forEach(chat => {
                const item = document.createElement('div');
                item.className = `history-item${chat.id === currentChatId ? ' active' : ''}`;

                const date = new Date(chat.createdAt).toLocaleDateString();

                item.innerHTML = `
                    <button class="delete-chat-btn" onclick="deleteChat('${chat.id}', event)">×</button>
                    <div class="history-item-title">${chat.title}</div>
                    <div class="history-item-date">${date}</div>
                `;

                item.addEventListener('click', () => loadChat(chat.id));
                historyList.appendChild(item);
            });
        }

        window.deleteChat = function(chatId, event) {
            event.stopPropagation();

            if (!confirm('Delete this chat?')) return;

            chatHistory = chatHistory.filter(c => c.id !== chatId);
            localStorage.setItem('chatHistory', JSON.stringify(chatHistory));

            if (currentChatId === chatId) {
                if (chatHistory.length > 0) {
                    loadChat(chatHistory[0].id);
                } else {
                    createNewChat();
                }
            }

            loadHistoryList();
        }

        function clearChatDisplay() {
            chatMessages.innerHTML = `
                <div class="welcome-message">
                    <h2>Welcome!</h2>
                    <p>How can I help you today?</p>
                    <div class="quick-prompts">
                        <button class="prompt-btn" onclick="usePrompt('Explain quantum computing in simple terms')">
                            💡 Explain quantum computing
                        </button>
                        <button class="prompt-btn" onclick="usePrompt('Write a Python function to sort a list')">
                            💻 Code example
                        </button>
                        <button class="prompt-btn" onclick="usePrompt('Give me 5 productivity tips')">
                            📝 Productivity tips
                        </button>
                        <button class="prompt-btn" onclick="usePrompt('Tell me a fun fact')">
                            🎲 Fun fact
                        </button>
                    </div>
                </div>
            `;
        }

        function sanitizeFileName(str) {
            return str.replace(/[<>:"/\\|?*\x00-\x1F]/g, '').replace(/\s+/g, '_').substring(0, 20) || 'chat';
        }

        function downloadChat() {
            if (!currentChatId) {
                if (chatHistory.length > 0) {
                    currentChatId = chatHistory[0].id;
                } else {
                    alert('No chat to download!');
                    return;
                }
            }

            chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];
            const chat = chatHistory.find(c => c.id === currentChatId);
            if (!chat || !Array.isArray(chat.messages) || chat.messages.length === 0) {
                alert('No messages to download!');
                return;
            }

            let content = `Chat History - ${chat.title}\n`;
            content += `Date: ${new Date(chat.createdAt).toLocaleString()}\n`;
            content += '='.repeat(50) + '\n\n';

            chat.messages.forEach(msg => {
                const sender = msg.isUser ? 'You' : 'Assistant';
                content += `${sender}:\n${msg.content}\n\n`;
                content += '-'.repeat(50) + '\n\n';
            });

            const blob = new Blob([content], { type: 'text/plain' });

            let fileTitle = sanitizeFileName(chat.title);
            const filename = `chat-${fileTitle}-${new Date(chat.createdAt).toISOString().slice(0,19).replace(/[-T:]/g, '')}.txt`;

            const a = document.createElement('a');
            a.style.display = 'none';
            document.body.appendChild(a);
            const url = window.URL.createObjectURL(blob);
            a.href = url;
            a.download = filename;
            a.click();
            setTimeout(() => {
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }, 100);
        }

        window.usePrompt = function(prompt) {
            userInput.value = prompt;
            userInput.dispatchEvent(new Event('input'));
            userInput.focus();
        }

        function addMessage(message, isUser) {
            const welcomeMessage = chatMessages.querySelector('.welcome-message');
            if (welcomeMessage) welcomeMessage.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'assistant-message'}`;

            const messageWrapper = document.createElement('div');
            messageWrapper.className = 'message-wrapper';

            const senderLabel = document.createElement('div');
            senderLabel.className = 'message-sender';
            senderLabel.textContent = isUser ? 'You' : 'Assistant';

            const content = document.createElement('div');
            content.className = 'message-content';

            // Use markdown for assistant messages
            if (!isUser && typeof marked !== 'undefined') {
                content.innerHTML = marked.parse(message);
            } else {
                content.innerHTML = escapeHtml(message);
            }

            // Add copy button for assistant messages with iOS-style icon
            if (!isUser) {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.title = 'Copy message';
                copyBtn.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                `;
                copyBtn.onclick = () => copyMessage(message, copyBtn);
                content.appendChild(copyBtn);
            }

            // Add timestamp
            const timestamp = document.createElement('div');
            timestamp.className = 'message-timestamp';
            timestamp.textContent = new Date().toLocaleTimeString([], { 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            messageWrapper.appendChild(senderLabel);
            messageWrapper.appendChild(content);
            messageDiv.appendChild(messageWrapper);
            messageDiv.appendChild(timestamp);

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function copyMessage(text, button) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();

            try {
                document.execCommand('copy');
                button.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                `;
                button.classList.add('copied');

                setTimeout(() => {
                    button.innerHTML = `
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    `;
                    button.classList.remove('copied');
                }, 2000);

            } catch (err) {
                alert("Copy failed");
            }

            document.body.removeChild(textarea);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        function setLoading(isLoading) {
            loadingIndicator.style.display = isLoading ? 'block' : 'none';
            sendBtn.disabled = isLoading;
            userInput.disabled = isLoading;
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant-message';
            typingDiv.id = 'typingIndicator';

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';

            const senderLabel = document.createElement('div');
            senderLabel.className = 'message-sender';
            senderLabel.textContent = 'Assistant';

            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;

            wrapper.appendChild(senderLabel);
            wrapper.appendChild(content);
            typingDiv.appendChild(wrapper);
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function addErrorWithRetry(errorMsg) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant-message';

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';

            const senderLabel = document.createElement('div');
            senderLabel.className = 'message-sender';
            senderLabel.textContent = 'Assistant';

            const content = document.createElement('div');
            content.className = 'message-content error-message';
            content.innerHTML = `
                <p>❌ ${errorMsg}</p>
                <button class="retry-btn" onclick="retryLastMessage()">🔄 Retry</button>
            `;

            wrapper.appendChild(senderLabel);
            wrapper.appendChild(content);
            messageDiv.appendChild(wrapper);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        window.retryLastMessage = function() {
            if (lastFailedMessage) {
                userInput.value = lastFailedMessage;
                sendMessage();
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            lastFailedMessage = message;

            addMessage(message, true);
            saveMessage(message, true);

            userInput.value = '';
            userInput.style.height = 'auto';
            charCount.textContent = '0/1000';
            sendBtn.disabled = true;
            setLoading(true);

            showTypingIndicator();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                removeTypingIndicator();

                if (data.success) {
                    addMessage(data.response, false);
                    saveMessage(data.response, false);
                } else {
                    if (response.status === 429) {
                        addErrorWithRetry('Too many requests! Please wait 10-30 seconds and try again.');
                    } else {
                        addErrorWithRetry(data.error || 'Unknown error occurred');
                    }
                }
            } catch (error) {
                removeTypingIndicator();
                console.error('Error:', error);
                addErrorWithRetry('Connection error. Please check your internet and try again.');
            } finally {
                setLoading(false);
                userInput.focus();
            }
        }
    </script>
</body>
</html>
